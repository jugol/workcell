services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: workcell
      POSTGRES_PASSWORD: workcell
      POSTGRES_DB: workcell
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workcell -d workcell"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://workcell:workcell@db:5432/workcell
      PORT: "3100"
      SERVE_UI: "true"
      WORKCELL_DEPLOYMENT_MODE: "authenticated"
      WORKCELL_DEPLOYMENT_EXPOSURE: "private"
      WORKCELL_PUBLIC_URL: "${WORKCELL_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - workcell-data:/workcell
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  workcell-data:
