<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 392" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="878" height="390" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="36" y="46" font-size="22" font-weight="700" fill="#111827">App Blueprint — the whole app as one flow</text>
  <text x="36" y="71" font-size="13.5" fill="#6b7280">Screens wired by labelled navigation. Each screen pairs a pure mockup with its screen plan.</text>

  <!-- ===== node A ===== -->
  <g>
    <rect x="40" y="104" width="170" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="40" y="104" width="170" height="22" rx="10" fill="#e0e7ff"/>
    <rect x="40" y="116" width="170" height="10" fill="#e0e7ff"/>
    <rect x="58" y="142" width="110" height="9" rx="4" fill="#cbd5e1"/>
    <rect x="58" y="160" width="134" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="58" y="178" width="90" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="58" y="206" width="94" height="26" rx="13" fill="#dbeafe"/>
    <text x="69" y="223" font-size="11" font-weight="600" fill="#1d4ed8">Sign in</text>
    <text x="40" y="276" font-size="12.5" font-weight="600" fill="#334155">Onboarding</text>
    <text x="40" y="294" font-size="10.5" fill="#94a3b8">mockup + plan</text>
  </g>

  <!-- ===== node B (selected) ===== -->
  <g>
    <rect x="355" y="104" width="170" height="150" rx="10" fill="#f8fafc" stroke="#6366f1" stroke-width="2"/>
    <rect x="355" y="104" width="170" height="22" rx="10" fill="#c7d2fe"/>
    <rect x="355" y="116" width="170" height="10" fill="#c7d2fe"/>
    <rect x="373" y="142" width="120" height="9" rx="4" fill="#cbd5e1"/>
    <rect x="373" y="160" width="134" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="373" y="178" width="78" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="373" y="206" width="110" height="26" rx="13" fill="#dbeafe"/>
    <text x="384" y="223" font-size="11" font-weight="600" fill="#1d4ed8">Continue</text>
    <text x="355" y="276" font-size="12.5" font-weight="600" fill="#334155">Home</text>
    <text x="355" y="294" font-size="10.5" fill="#94a3b8">mockup + plan</text>
  </g>

  <!-- ===== node C ===== -->
  <g>
    <rect x="670" y="104" width="170" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="670" y="104" width="170" height="22" rx="10" fill="#e0e7ff"/>
    <rect x="670" y="116" width="170" height="10" fill="#e0e7ff"/>
    <rect x="688" y="142" width="100" height="9" rx="4" fill="#cbd5e1"/>
    <rect x="688" y="160" width="134" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="688" y="178" width="96" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="688" y="206" width="120" height="26" rx="13" fill="#dcfce7"/>
    <text x="699" y="223" font-size="11" font-weight="600" fill="#15803d">Save plan</text>
    <text x="670" y="276" font-size="12.5" font-weight="600" fill="#334155">Lesson</text>
    <text x="670" y="294" font-size="10.5" fill="#94a3b8">mockup + plan</text>
  </g>

  <!-- navigation arrows -->
  <path d="M210 175 L353 175" stroke="#94a3b8" stroke-width="2" marker-end="url(#ab)"/>
  <text x="281" y="168" font-size="10.5" fill="#64748b" text-anchor="middle">open</text>
  <path d="M525 175 L668 175" stroke="#94a3b8" stroke-width="2" marker-end="url(#ab)"/>
  <text x="596" y="168" font-size="10.5" fill="#64748b" text-anchor="middle">next</text>

  <!-- click -> plan callout from selected node -->
  <path d="M440 254 L440 286" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#abi)"/>
  <rect x="300" y="300" width="280" height="68" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="318" y="324" font-size="12" font-weight="700" fill="#4338ca">Click a screen &#8594; its screen plan</text>
  <text x="318" y="344" font-size="11" fill="#4b5563">purpose · states · interactions · data — the</text>
  <text x="318" y="360" font-size="11" fill="#4b5563">mockup beside its spec, with in/out links.</text>

  <!-- interaction hints -->
  <text x="640" y="326" font-size="11.5" fill="#475569" font-weight="600">Figma-style canvas</text>
  <text x="640" y="346" font-size="11" fill="#94a3b8">drag to arrange &#183; scroll to zoom</text>
  <text x="640" y="362" font-size="11" fill="#94a3b8">positions persist per project</text>

  <defs>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="abi" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/></marker>
  </defs>
</svg>
