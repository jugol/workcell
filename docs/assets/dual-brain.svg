<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 372" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="878" height="370" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="36" y="44" font-size="21" font-weight="700" fill="#111827">Dual-brain deliberation &#8212; OpenRouter-Fusion style</text>
  <text x="36" y="68" font-size="13" fill="#6b7280">Two models generate in parallel, then a synthesizer merges them into one. (Experimental, opt-in.)</text>

  <!-- Brain A — parallel generate -->
  <rect x="36" y="88" width="206" height="86" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="56" y="114" font-size="14" font-weight="700" fill="#1d4ed8">Brain A &#183; model A</text>
  <text x="56" y="136" font-size="12" fill="#4b5563">generates a candidate</text>
  <text x="56" y="154" font-size="12" fill="#4b5563">independently</text>

  <!-- Brain B — parallel generate -->
  <rect x="36" y="196" width="206" height="86" rx="12" fill="#faf5ff" stroke="#e9d5ff"/>
  <text x="56" y="222" font-size="14" font-weight="700" fill="#7c3aed">Brain B &#183; model B</text>
  <text x="56" y="244" font-size="12" fill="#4b5563">generates a candidate</text>
  <text x="56" y="262" font-size="12" fill="#4b5563">independently</text>

  <text x="139" y="186" font-size="10.5" fill="#9ca3af" text-anchor="middle">parallel &#183; neither sees the other</text>

  <!-- arrows A, B -> synthesizer -->
  <path d="M242 131 C 290 131, 300 178, 344 184" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M242 239 C 290 239, 300 196, 344 190" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Synthesizer -->
  <rect x="346" y="142" width="184" height="88" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="366" y="168" font-size="14" font-weight="700" fill="#4338ca">Synthesizer</text>
  <text x="366" y="187" font-size="11.5" fill="#6366f1">Brain A (default)</text>
  <text x="366" y="210" font-size="12" fill="#4b5563">reconciles both into</text>
  <text x="366" y="222" font-size="12" fill="#4b5563">one stronger answer</text>

  <!-- arrow -> final -->
  <path d="M530 186 L596 186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Final -->
  <rect x="598" y="142" width="246" height="88" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="618" y="168" font-size="14" font-weight="700" fill="#15803d">Final answer</text>
  <text x="618" y="190" font-size="12" fill="#4b5563">keep what each got right,</text>
  <text x="618" y="208" font-size="12" fill="#4b5563">drop the rest, resolve</text>
  <text x="618" y="222" font-size="12" fill="#4b5563">conflicts on the merits</text>

  <!-- evidence strip -->
  <rect x="36" y="300" width="808" height="56" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="56" y="324" font-size="12" fill="#374151"><tspan font-weight="700" fill="#15803d">Why it works:</tspan> the synthesis step itself drives the lift &#8212; OpenRouter Fusion on Perplexity's DRACO saw</text>
  <text x="56" y="343" font-size="12" fill="#374151">Claude Opus 4.8 paired with <tspan font-style="italic">itself</tspan> go <tspan font-weight="800" fill="#15803d">58.8% &#8594; 65.5%</tspan> (two passes of one model diverge; reconciling beats a single shot).</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
</svg>
